apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appnetwise-ingress
  annotations:
    cert-manager.io/acme-challenge-type: dns01
    cert-manager.io/cluster-issuer: letsencrypt-azure
  labels:
    kustomize.toolkit.fluxcd.io/name: appnetwise.github.io
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  rules:
  - host: appnetwise.com
    http:
      paths:
      - path: /
        #pathType: Prefix
        pathType: ImplementationSpecific
        backend:
          service:
            name: appnetwise-service
            port:
              number: 8000
  tls:
  - hosts:
    - appnetwise.com
    secretName: appnetwise-tls
